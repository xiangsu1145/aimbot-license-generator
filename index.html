<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aimbot 授权码生成器</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg-card: #131826;
    --bg-elevated: #1a2030;
    --border: #1f2937;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --text-muted: #6b7280;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --accent-glow: rgba(59, 130, 246, 0.15);
    --purple: #8b5cf6;
    --success: #10b981;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(59, 130, 246, 0.08), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(139, 92, 246, 0.08), transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    width: 100%;
    max-width: 480px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 36px;
    box-shadow:
      0 24px 48px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.03) inset;
  }

  .logo {
    width: 56px;
    height: 56px;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: white;
    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
  }

  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    background: var(--accent-glow);
    color: var(--accent);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    margin: 0 2px;
  }

  button {
    width: 100%;
    padding: 14px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: 0.3px;
  }

  button:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
  }

  button:active:not(:disabled) { transform: translateY(0); }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .status {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    min-height: 20px;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .status.error { color: var(--danger); }
  .status.success { color: var(--success); }

  .result {
    margin-top: 24px;
    padding: 20px;
    background: rgba(59, 130, 246, 0.04);
    border: 1px solid rgba(59, 130, 246, 0.15);
    border-radius: 14px;
    display: none;
  }

  .result.active {
    display: block;
    animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .code-display {
    font-family: "SF Mono", Menlo, Consolas, "Courier New", monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    word-break: break-all;
    padding: 14px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 10px;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.6;
    border: 1px solid rgba(59, 130, 246, 0.1);
  }

  .meta {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    padding: 0 4px;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .meta-value {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    color: var(--text);
  }

  .copy-btn {
    margin-top: 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px;
  }

  .copy-btn:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--accent);
    transform: none;
    box-shadow: none;
  }

  .copy-btn.copied {
    background: rgba(16, 185, 129, 0.1);
    border-color: var(--success);
    color: var(--success);
  }

  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .footer a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer a:hover { color: var(--accent); }

  @media (max-width: 480px) {
    .container { padding: 32px 24px; border-radius: 16px; }
    .code-display { font-size: 13px; letter-spacing: 0.3px; padding: 12px; }
    h1 { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">A</div>
  <h1>Aimbot 授权码生成器</h1>
  <p class="subtitle">每次生成 <span class="badge">48 小时</span> 有效期的授权码</p>

  <button id="generate">生成授权码</button>

  <div class="status" id="status"></div>

  <div class="result" id="result">
    <div class="label">授权码</div>
    <div class="code-display" id="code"></div>
    <div class="meta">
      <div class="meta-item">
        <span class="meta-label">开始</span>
        <span class="meta-value" id="start">--</span>
      </div>
      <div class="meta-item" style="text-align: right;">
        <span class="meta-label">到期</span>
        <span class="meta-value" id="expiry">--</span>
      </div>
    </div>
    <button class="copy-btn" id="copy">复制授权码</button>
  </div>

  <div class="footer">
    时间由 <a href="https://timeapi.io" target="_blank" rel="noopener">timeapi.io</a> 提供（C++ native / Node.js / Web 统一时间源）
  </div>
</div>
