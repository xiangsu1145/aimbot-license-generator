<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aimbot 授权码生成器</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg-card: #131826;
    --bg-elevated: #1a2030;
    --border: #1f2937;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --text-muted: #6b7280;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --accent-glow: rgba(59, 130, 246, 0.15);
    --purple: #8b5cf6;
    --success: #10b981;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(59, 130, 246, 0.08), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(139, 92, 246, 0.08), transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    width: 100%;
    max-width: 480px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 36px;
    box-shadow:
      0 24px 48px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.03) inset;
  }

  .logo {
    width: 56px;
    height: 56px;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: white;
    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
  }

  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    background: var(--accent-glow);
    color: var(--accent);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    margin: 0 2px;
  }

  button {
    width: 100%;
    padding: 14px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: 0.3px;
  }

  button:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
  }

  button:active:not(:disabled) { transform: translateY(0); }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .status {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    min-height: 20px;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .status.error { color: var(--danger); }
  .status.success { color: var(--success); }

  .result {
    margin-top: 24px;
    padding: 20px;
    background: rgba(59, 130, 246, 0.04);
    border: 1px solid rgba(59, 130, 246, 0.15);
    border-radius: 14px;
    display: none;
  }

  .result.active {
    display: block;
    animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .code-display {
    font-family: "SF Mono", Menlo, Consolas, "Courier New", monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    word-break: break-all;
    padding: 14px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 10px;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.6;
    border: 1px solid rgba(59, 130, 246, 0.1);
  }

  .meta {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    padding: 0 4px;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .meta-value {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    color: var(--text);
  }

  .copy-btn {
    margin-top: 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px;
  }

  .copy-btn:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--accent);
    transform: none;
    box-shadow: none;
  }

  .copy-btn.copied {
    background: rgba(16, 185, 129, 0.1);
    border-color: var(--success);
    color: var(--success);
  }

  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .footer a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer a:hover { color: var(--accent); }

  @media (max-width: 480px) {
    .container { padding: 32px 24px; border-radius: 16px; }
    .code-display { font-size: 13px; letter-spacing: 0.3px; padding: 12px; }
    h1 { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">A</div>
  <h1>Aimbot 授权码生成器</h1>
  <p class="subtitle">每次生成 <span class="badge">48 小时</span> 有效期的授权码</p>

  <button id="generate">生成授权码</button>

  <div class="status" id="status"></div>

  <div class="result" id="result">
    <div class="label">授权码</div>
    <div class="code-display" id="code"></div>
    <div class="meta">
      <div class="meta-item">
        <span class="meta-label">开始</span>
        <span class="meta-value" id="start">--</span>
      </div>
      <div class="meta-item" style="text-align: right;">
        <span class="meta-label">到期</span>
        <span class="meta-value" id="expiry">--</span>
      </div>
    </div>
    <button class="copy-btn" id="copy">复制授权码</button>
  </div>

  <div class="footer">
    时间由 <a href="https://timeapi.io" target="_blank" rel="noopener">timeapi.io</a> 提供
  </div>
</div>

<script>
'use strict';

// ⚠️ 密钥在前端可见是已知安全风险（接受"挡小白"定位）
// 必须与 Android 端 keys/secret.key 完全一致
const KEY_HEX = 'c2a807bf7b553398cbba19271501b8b0';
const VERSION = 0x0001;
const HOURS = 48;
const TIME_API = 'https://timeapi.io/api/Time/current/zone?timeZone=UTC';

const BASE62 = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';

// CRC16-CCITT (多项式 0x1021, 初值 0xFFFF)
function crc16ccitt(buf) {
  let crc = 0xFFFF;
  for (let i = 0; i < buf.length; i++) {
    crc ^= buf[i] << 8;
    for (let j = 0; j < 8; j++) {
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) & 0xFFFF : (crc << 1) & 0xFFFF;
    }
  }
  return crc;
}

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) {
    bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
  }
  return bytes;
}

function toBase62(buf) {
  let num = 0n;
  for (let i = 0; i < buf.length; i++) num = num * 256n + BigInt(buf[i]);
  let result = '';
  if (num === 0n) {
    return '0'.repeat(25);
  }
  while (num > 0n) {
    result = BASE62[Number(num % 62n)] + result;
    num /= 62n;
  }
  while (result.length < 25) result = '0' + result;
  return result;
}

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function fmtDate(ts) {
  const d = new Date(ts * 1000);
  return `${d.getFullYear()}/${pad2(d.getMonth() + 1)}/${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

async function fetchServerTime() {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000);
  try {
    const resp = await fetch(TIME_API, { signal: controller.signal });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    if (!json.dateTime) throw new Error('返回数据异常');
    const ts = Math.floor(new Date(json.dateTime).getTime() / 1000);
    if (!Number.isFinite(ts)) throw new Error('时间戳解析失败');
    return ts;
  } finally {
    clearTimeout(timeout);
  }
}

async function generateCode() {
  const startTs = await fetchServerTime();
  const nonce = crypto.getRandomValues(new Uint8Array(4));

  // IV = nonce(4B) + 0x00 × 12 = 16 字节
  const iv = new Uint8Array(16);
  iv.set(nonce, 0);

  // 明文 14 字节: [起始时间戳 8B][时长 2B][版本 2B][CRC16 2B]
  const plaintext = new Uint8Array(14);
  const view = new DataView(plaintext.buffer);
  view.setBigUint64(0, BigInt(startTs), false);
  view.setUint16(8, HOURS, false);
  view.setUint16(10, VERSION, false);
  const crc = crc16ccitt(plaintext.subarray(0, 12));
  view.setUint16(12, crc, false);

  // AES-128-CTR 加密
  const keyBytes = hexToBytes(KEY_HEX);
  const cryptoKey = await crypto.subtle.importKey(
    'raw', keyBytes, { name: 'AES-CTR' }, false, ['encrypt']
  );
  const ciphertext = new Uint8Array(await crypto.subtle.encrypt(
    { name: 'AES-CTR', counter: iv, length: 64 }, cryptoKey, plaintext
  ));

  // 拼接 nonce + 密文 = 18 字节
  const payload = new Uint8Array(18);
  payload.set(nonce, 0);
  payload.set(ciphertext, 4);

  return {
    code: toBase62(payload),
    startTs,
    expiryTs: startTs + HOURS * 3600
  };
}

const btn = document.getElementById('generate');
const status = document.getElementById('status');
const result = document.getElementById('result');
const codeEl = document.getElementById('code');
const startEl = document.getElementById('start');
const expiryEl = document.getElementById('expiry');
const copyBtn = document.getElementById('copy');

function setStatus(text, type) {
  status.textContent = text;
  status.className = 'status' + (type ? ' ' + type : '');
}

btn.addEventListener('click', async () => {
  btn.disabled = true;
  result.classList.remove('active');
  copyBtn.classList.remove('copied');
  copyBtn.textContent = '复制授权码';
  setStatus('正在连接 timeapi.io...');

  try {
    const { code, startTs, expiryTs } = await generateCode();
    codeEl.textContent = code;
    startEl.textContent = fmtDate(startTs);
    expiryEl.textContent = fmtDate(expiryTs);
    result.classList.add('active');
    setStatus('');
  } catch (e) {
    if (e.name === 'AbortError') {
      setStatus('请求超时，请检查网络后重试', 'error');
    } else {
      setStatus('生成失败：' + e.message, 'error');
    }
  } finally {
    btn.disabled = false;
  }
});

copyBtn.addEventListener('click', async () => {
  const code = codeEl.textContent.replace(/-/g, '');
  try {
    await navigator.clipboard.writeText(code);
    copyBtn.classList.add('copied');
    copyBtn.textContent = '✓ 已复制到剪贴板';
    setTimeout(() => {
      copyBtn.classList.remove('copied');
      copyBtn.textContent = '复制授权码';
    }, 2000);
  } catch {
    const range = document.createRange();
    range.selectNode(codeEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    setStatus('已选中，请按 Ctrl+C / Cmd+C 复制', 'success');
  }
});
</script>
</body>
</html>
